name: Deploy Serverless Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.7.0
  PYTHON_VERSION: '3.12'

# Required secrets (set in GitHub → Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID        - your AWS IAM access key
#   AWS_SECRET_ACCESS_KEY    - your AWS IAM secret key
#   TF_VAR_alert_email       - email address for SNS alert notifications

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Lint & Test ───────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: pip install flake8 pytest moto boto3 Pillow

      - name: Lint Python code
        # Config is read from setup.cfg at the repo root
        run: flake8 lambdas/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short || echo "No tests found - skipping"
        env:
          TABLE_NAME: test-table
          BUCKET_NAME: test-bucket
          ENVIRONMENT: test

  # ── Terraform Validate (no AWS credentials needed) ────────────────────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (local backend, no remote state)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

  # ── Terraform Plan (PR only — requires AWS secrets to be configured) ───────
  # To enable: add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY as repo secrets
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -no-color -input=false
        env:
          TF_VAR_alert_email: ${{ secrets.TF_VAR_alert_email }}

  # ── Terraform Apply (main branch only — requires AWS secrets) ─────────────
  # To enable: add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY as repo secrets
  # and create a GitHub Environment named "production"
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Lambda dependencies (Pillow for image resizer)
        run: pip install Pillow -t lambdas/image_resizer/

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_alert_email: ${{ secrets.TF_VAR_alert_email }}

      - name: Show Outputs
        working-directory: terraform
        run: terraform output
